# Cloudflare Pages configuration for Momentos Footy
# Static assets live in ./site ; API lives in ./functions (Pages Functions)

name = "momento"
compatibility_date = "2024-11-01"
pages_build_output_dir = "site"

# ---- D1 database (products, variants, orders) ----
# Create with:  npx wrangler d1 create momento-db
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "momento-db"
database_id = "41549b7a-8935-42de-bff2-b50cc01fba18"

# ---- R2 bucket (product images) ----
# Create with:  npx wrangler r2 bucket create momento-media
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "momento-media"

# ---- Public, non-secret config ----
[vars]
STORE_NAME = "Momentos Footy"
CURRENCY = "INR"
CURRENCY_SYMBOL = "₹"
# Email (Resend). EMAIL_FROM's domain must be verified in your Resend account.
ADMIN_EMAIL = "siddharthmahajan@arksoft.xyz"
EMAIL_FROM = "Momentos Footy <orders@arksoft.xyz>"

# ---- Secrets (DO NOT put here). Set with `wrangler pages secret put <NAME>`:
#   RAZORPAY_KEY_ID
#   RAZORPAY_KEY_SECRET
#   RAZORPAY_WEBHOOK_SECRET
#   ADMIN_PASSWORD
#   SESSION_SECRET
# For local dev, put them in .dev.vars (see .dev.vars.example)
